  <!-- Bottom accent line -->
  <rect x="500" y="400" width="200" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.5)">display-pallets.nl</text>
